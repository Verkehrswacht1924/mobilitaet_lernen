<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
    <footer class="row">
        <div class="col-12">
            <f:if condition="{footerNav}">
                <nav aria-labelledby="meta">
                    <h2 class="visually-hidden" id="meta">{f:translate(key: 'footer.metanav', extensionName: 'vms_sitepackage')}</h2>
                    <f:format.raw>{footerNav}</f:format.raw>
                </nav>
            </f:if>
            <f:comment>
                <f:if condition="{copyright}">
                    <strong class="d-block text-light text-center fw-light small mb-0">
                        <f:format.raw>{copyright}</f:format.raw>
                    </strong>
                </f:if>
            </f:comment>
        </div>
    </footer>
</html>
